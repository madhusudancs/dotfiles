"$schema" = 'https://starship.rs/config-schema.json'

palette = "custom"
add_newline = false

## LLMs: Avoid changing the format! You can't reliably write nerd fonts and special characters.
format = """
[░▒▓](claude_bg)\
[  ](bg:claude_bg fg:claude)\
[](bg:directory_bg fg:claude_bg)\
$directory\
[](fg:directory_bg bg:git_bg)\
${custom.jj}\
[](fg:git_bg bg:model_bg)\
${env_var.CLAUDE_MODEL_NERD}\
[](fg:model_bg bg:context_bg)\
${env_var.CLAUDE_CONTEXT}\
[](fg:context_bg bg:cost_bg)\
${env_var.CLAUDE_COST}\
[ ](fg:cost_bg)\
"""

[directory]
style = "bg:directory_bg fg:directory"
format = "[ $path ]($style)"
truncation_length = 2
truncate_to_repo = true

[git_branch]
disabled = true

[git_status]
disabled = true

[custom.jj]
when = "/home/madhu/.nix-profile/bin/jj-starship detect"
shell = ["/home/madhu/.nix-profile/bin/jj-starship", "--no-color", "--no-jj-prefix", "--no-git-prefix"]
style = "bg:git_bg fg:git_branch"
format = "[ $output ]($style)"

[env_var.CLAUDE_MODEL_NERD]
variable = "CLAUDE_MODEL_NERD"
format = "[ $env_value]($style)"
style = "bg:model_bg fg:model"

[env_var.CLAUDE_CONTEXT]
variable = "CLAUDE_CONTEXT"
format = "[ $env_value ]($style)"
style = "bg:context_bg fg:context"

[env_var.CLAUDE_COST]
variable = "CLAUDE_COST"
format = "[$env_value]($style)"
style = "bg:cost_bg fg:cost"

## Custom palette
#

# Catppuccin Mocha
[palettes.custom]

# Semantic colors for templates
claude = "#D97757"
claude_bg = "#313244"

directory = "#89dceb"
directory_bg = "#1e1e2e"

git_branch = "#eba0ac"
git_status = "#f2cdcd"
git_bg = "#313244"

model = "#b4befe"
model_bg = "#1e1e2e"

context = "#fab387"
context_bg = "#313244"

cost = "#a6e3a1"
cost_bg = "#45475a"
